services:
  # 1. Backend persistent signaling web service
  - type: web
    name: virtual-photobooth-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false
      - key: TURN_URL
        sync: false
      - key: TURN_USERNAME
        sync: false
      - key: TURN_PASSWORD
        sync: false

  # 2. Frontend React static site
  - type: static
    name: virtual-photobooth-frontend
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SERVER_URL
        fromService:
          type: web
          name: virtual-photobooth-backend
          property: host
